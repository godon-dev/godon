services:
  greenhouse-1:
    image: ghcr.io/godon-dev/godon-bench-greenhouse:0.1.0
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      GREENHOUSE_SCENARIO: simple
      GREENHOUSE_WEATHER: smooth
      GREENHOUSE_SEED: "42"
      COUPLING_NEIGHBORS: "http://greenhouse-2:8090"
      COUPLING_FACTOR: "0.1"

  greenhouse-2:
    image: ghcr.io/godon-dev/godon-bench-greenhouse:0.1.0
    ports:
      - "8091:8090"
    environment:
      PORT: "8090"
      GREENHOUSE_SCENARIO: simple
      GREENHOUSE_WEATHER: smooth
      GREENHOUSE_SEED: "123"
      COUPLING_NEIGHBORS: "http://greenhouse-1:8090"
      COUPLING_FACTOR: "0.1"
