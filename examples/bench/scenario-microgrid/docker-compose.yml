services:
  microgrid-1:
    image: ghcr.io/godon-dev/godon-bench-microgrid:0.4.0
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      MICROGRID_SEED: "42"
      COUPLING_NEIGHBORS: "http://microgrid-2:8090"
      COUPLING_FACTOR: ${COUPLING_FACTOR:-0.1}

  microgrid-2:
    image: ghcr.io/godon-dev/godon-bench-microgrid:0.4.0
    ports:
      - "8091:8090"
    environment:
      PORT: "8090"
      MICROGRID_SEED: "123"
      COUPLING_NEIGHBORS: "http://microgrid-1:8090"
      COUPLING_FACTOR: ${COUPLING_FACTOR:-0.1}
