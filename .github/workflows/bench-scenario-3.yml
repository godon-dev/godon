name: Bench Scenario 3 — Two Optimizers, Two Uncoupled Targets (Control)

on:
  workflow_dispatch:
    inputs:
      trials:
        description: "Number of optimization trials per breeder"
        required: false
        default: "10"
      greenhouse_scenario:
        description: "Greenhouse scenario (simple, medium, complex)"
        required: false
        default: "simple"
      greenhouse_weather:
        description: "Weather pattern (smooth, noisy, adversarial)"
        required: false
        default: "smooth"

jobs:
  bench-scenario-3:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start greenhouse targets
        run: |
          cd examples/bench/scenario-3
          docker compose up -d
          sleep 5

      - name: Verify both greenhouses healthy
        run: |
          for port in 8090 8091; do
            curl -sf http://localhost:$port/health | python3 examples/bench/scripts/extract_key.py status
            echo "Port $port: OK"
          done

      - name: Run independent optimizers in parallel
        run: |
          run_optimizer() {
            local PORT=$1
            local LABEL=$2
            for i in $(seq 1 ${{ inputs.trials }}); do
              PARAMS=$(python3 examples/bench/scripts/seeded_params.py $PORT $i)
              RESP=$(curl -sf -X POST http://localhost:$PORT/apply -H 'Content-Type: application/json' -d "$PARAMS")
              GROWTH=$(echo "$RESP" | python3 examples/bench/scripts/extract_key.py growth_rate)
              echo "$LABEL trial $i: growth=$GROWTH"
            done
          }

          run_optimizer 8090 "breeder-1" &
          run_optimizer 8091 "breeder-2" &
          wait

      - name: Validate no coupling — independent targets
        run: |
          for port in 8090 8091; do
            curl -sf http://localhost:$port/status | python3 examples/bench/scripts/validate_no_coupling.py $port
          done

      - name: Cleanup
        if: always()
        run: |
          cd examples/bench/scenario-3
          docker compose down -v
