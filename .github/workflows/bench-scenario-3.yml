name: Bench Scenario 3 — Two Optimizers, Two Uncoupled Targets (Control)

on:
  workflow_dispatch:

env:
  GREENHOUSE_IMAGE: ghcr.io/godon-dev/godon-bench-greenhouse:0.1.0

jobs:
  bench-scenario-3:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start greenhouse targets
        run: |
          cd examples/bench/scenario-3
          docker compose up -d
          sleep 5

      - name: Verify both greenhouses healthy
        run: |
          for port in 8090 8091; do
            HEALTH=$(curl -sf http://localhost:$port/health)
            echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'"
            echo "Port $port: OK"
          done

      - name: Run independent optimizers in parallel
        run: |
          run_optimizer() {
            local PORT=$1
            local LABEL=$2
            for i in $(seq 1 10); do
              PARAMS=$(python3 -c "
              import json, random
              random.seed($PORT * 1000 + $i)
              print(json.dumps({
                'heating_setpoints': [random.uniform(10,35), random.uniform(10,35)],
                'vent_openings': [random.uniform(0,1), random.uniform(0,1)],
                'shading': random.uniform(0,1),
                'co2_injection': random.uniform(0,15),
                'light_intensity': random.uniform(50,800),
                'irrigation': random.uniform(0.1,2.5),
                'sim_steps': random.randint(20,150)
              }))")
              RESP=$(curl -sf -X POST http://localhost:$PORT/apply -H 'Content-Type: application/json' -d "$PARAMS")
              GROWTH=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['growth_rate'])")
              echo "$LABEL trial $i: growth=$GROWTH"
            done
          }

          run_optimizer 8090 "breeder-1" &
          run_optimizer 8091 "breeder-2" &
          wait

      - name: Validate no coupling — independent targets
        run: |
          for port in 8090 8091; do
            curl -sf http://localhost:$port/status | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            factor = d.get('coupling_factor', 0)
            neighbors = d.get('coupling_neighbors', [])
            assert factor == 0 or factor is None, f'Port $port: unexpected coupling factor={factor}'
            assert len(neighbors) == 0, f'Port $port: unexpected neighbors {neighbors}'
            print(f'Port $port: no coupling (OK)')
            "
          done

      - name: Cleanup
        if: always()
        run: |
          cd examples/bench/scenario-3
          docker compose down -v
