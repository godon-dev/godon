name: "Bench Scenario Microgrid — Two Optimizers, Two Coupled Microgrid Consumers"

on:
  workflow_dispatch:
    inputs:
      min_trials:
        description: "Minimum trials per breeder for success"
        required: false
        default: "10"
      max_wait_minutes:
        description: "Max wait time in minutes"
        required: false
        default: "60"
      coupling_factor:
        description: "Coupling strength (0.1=weak, 0.5=moderate, 1.0=strong)"
        required: false
        default: "0.5"

jobs:
  bench-scenario-microgrid:
    name: "Microgrid: 2 breeders → 2 coupled consumers"
    runs-on: [self-hosted, linux]
    timeout-minutes: ${{ fromJSON(inputs.max_wait_minutes) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Verify KIND Cluster
        run: |
          if ! kind get clusters | grep -q "godon-1-cluster"; then
            echo "KIND cluster not found. Run setup workflows first."
            exit 1
          fi
          kind export kubeconfig --name=godon-1-cluster --kubeconfig=/tmp/kind_kubeconfig.yaml

      - name: Verify Godon Stack
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          if ! helm status godon --namespace godon >/dev/null 2>&1; then
            echo "Godon stack not found."
            exit 1
          fi
          kubectl wait --for=condition=ready pod -l component=api -n godon --timeout=300s

      - name: Start Coupled Microgrid Targets
        run: |
          export COUPLING_FACTOR="${{ inputs.coupling_factor }}"
          docker compose -f examples/bench/scenario-microgrid/docker-compose.yml -p bench-mg up -d

          for port in 8090 8091; do
            echo "Waiting for microgrid on port ${port}..."
            for i in $(seq 1 30); do
              if curl -s -f --connect-timeout 2 http://127.0.0.1:${port}/health >/dev/null 2>&1; then
                echo "Port ${port}: healthy"
                break
              fi
              sleep 2
            done
          done

          MG1_CID=$(docker compose -f examples/bench/scenario-microgrid/docker-compose.yml -p bench-mg ps -q microgrid-1)
          MG2_CID=$(docker compose -f examples/bench/scenario-microgrid/docker-compose.yml -p bench-mg ps -q microgrid-2)

          docker network connect kind $MG1_CID 2>/dev/null || true
          docker network connect kind $MG2_CID 2>/dev/null || true

          MG1_IP=$(docker inspect $MG1_CID -f '{{.NetworkSettings.Networks.kind.IPAddress}}')
          MG2_IP=$(docker inspect $MG2_CID -f '{{.NetworkSettings.Networks.kind.IPAddress}}')
          echo "MG1 KIND IP: ${MG1_IP}, MG2 KIND IP: ${MG2_IP}"

          echo "MG1_HOST=127.0.0.1" >> $GITHUB_ENV
          echo "MG1_PORT=8090" >> $GITHUB_ENV
          echo "MG1_IP=${MG1_IP}" >> $GITHUB_ENV
          echo "MG2_HOST=127.0.0.1" >> $GITHUB_ENV
          echo "MG2_PORT=8091" >> $GITHUB_ENV
          echo "MG2_IP=${MG2_IP}" >> $GITHUB_ENV

      - name: Port Forward to Godon API
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          API_POD=$(kubectl get pods -n godon -l component=api -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward -n godon --address 127.0.0.3 "${API_POD}" 9090:8080 > /tmp/pf.log 2>&1 &
          echo $! > /tmp/pf_pid
          sleep 3

          for i in $(seq 1 30); do
            if curl -s -f --connect-timeout 2 http://127.0.0.3:9090/health >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          echo "API_HOST=127.0.0.3" >> $GITHUB_ENV
          echo "API_PORT=9090" >> $GITHUB_ENV

      - name: Create Targets
        run: |
          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          CLI_IMAGE="ghcr.io/godon-dev/godon-cli:latest"
          MG1_URL="http://${{ env.MG1_IP }}:8090"
          MG2_URL="http://${{ env.MG2_IP }}:8090"

          create_target() {
            local NAME=$1
            local URL=$2
            local TEMPLATE=$3
            local FILE=$4
            local OUTFILE=$5

            EXISTING=$(curl -s ${API_URL}/targets | jq -r ".[] | select(.name==\"${NAME}\") | .id" 2>/dev/null || echo "")
            if [ -n "${EXISTING}" ]; then
              echo "Deleting existing target: ${EXISTING}" >&2
              curl -s -X DELETE ${API_URL}/targets/${EXISTING} >/dev/null 2>&1 || true
            fi

            sed -e "s/TARGET_NAME/${NAME}/" -e "s|TARGET_URL|${URL}|" \
              ${TEMPLATE} > ${FILE}
            chmod 644 ${FILE}

            CREATE_OUTPUT=$(docker run --rm --network host \
              -v $(pwd):/work:ro -w /work \
              "${CLI_IMAGE}" --hostname=${{ env.API_HOST }} --port=${{ env.API_PORT }} --insecure \
              target create --file=${FILE} 2>&1 || true)

            local ID=$(echo "${CREATE_OUTPUT}" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
            if [ -z "${ID}" ]; then
              ID=$(curl -s ${API_URL}/targets | jq -r ".[] | select(.name==\"${NAME}\") | .id" 2>/dev/null || echo "")
            fi
            if [ -z "${ID}" ]; then
              echo "Failed to create target ${NAME}" >&2
              exit 1
            fi
            echo "Target ${NAME}: ${ID}" >&2
            echo "${ID}" > "${OUTFILE}"
          }

          create_target "bench-mg-1" "${MG1_URL}" examples/bench/scenario-microgrid/targets/microgrid-1.yaml target-mg1.yaml /tmp/target_1_id
          create_target "bench-mg-2" "${MG2_URL}" examples/bench/scenario-microgrid/targets/microgrid-2.yaml target-mg2.yaml /tmp/target_2_id

      - name: Create Breeders
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          CLI_IMAGE="ghcr.io/godon-dev/godon-cli:latest"
          TARGET_1_ID=$(cat /tmp/target_1_id)
          TARGET_2_ID=$(cat /tmp/target_2_id)
          MG1_URL="http://${{ env.MG1_IP }}:8090"
          MG2_URL="http://${{ env.MG2_IP }}:8090"

          create_breeder() {
            local NAME=$1
            local TARGET_ID=$2
            local RECON_URL=$3
            local SRC=$4
            local DST=$5
            local OUTFILE=$6

            EXISTING=$(curl -s ${API_URL}/breeders | jq -r ".[] | select(.name==\"${NAME}\") | .id" 2>/dev/null || echo "")
            if [ -n "${EXISTING}" ]; then
              echo "Deleting existing breeder(s): ${EXISTING}" >&2
              for EID in ${EXISTING}; do
                curl -s -X DELETE "${API_URL}/breeders/${EID}?force=true" >/dev/null 2>&1 || true
              done
              sleep 5
            fi

            sed -e "s/\"microgrid-1\"/\"${TARGET_ID}\"/" \
                -e "s/\"microgrid-2\"/\"${TARGET_ID}\"/" \
                -e "s|http://microgrid-1:8090|${RECON_URL}|" \
                -e "s|http://microgrid-2:8090|${RECON_URL}|" \
                ${SRC} > ${DST}
            chmod 644 ${DST}

            local UUID=""
            for ATTEMPT in 1 2 3 4 5; do
              EXISTING=$(curl -s ${API_URL}/breeders | jq -r ".[] | select(.name==\"${NAME}\") | .id" 2>/dev/null || echo "")
              if [ -n "${EXISTING}" ]; then
                UUID=$(echo "${EXISTING}" | head -1)
                break
              fi

              CREATE_OUTPUT=$(docker run --rm --network host \
                -v $(pwd):/work -w /work \
                "${CLI_IMAGE}" --hostname=${{ env.API_HOST }} --port=${{ env.API_PORT }} --insecure \
                breeder create --name="${NAME}" --file=${DST} 2>&1 || true)

              UUID=$(echo "${CREATE_OUTPUT}" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
              if [ -z "${UUID}" ]; then
                UUID=$(curl -s ${API_URL}/breeders | jq -r ".[] | select(.name==\"${NAME}\") | .id" 2>/dev/null | head -1 || echo "")
              fi
              if [ -n "${UUID}" ]; then
                break
              fi
              sleep 10
            done

            if [ -z "${UUID}" ]; then
              echo "Failed to create breeder ${NAME}" >&2
              exit 1
            fi
            echo "Breeder ${NAME}: ${UUID}" >&2
            echo "${UUID}" > "${OUTFILE}"
          }

          create_breeder "bench-mg-1" "${TARGET_1_ID}" "${MG1_URL}" \
            examples/bench/scenario-microgrid/breeders/breeder-1.yml breeder-mg1-config.yaml /tmp/breeder_1_uuid
          create_breeder "bench-mg-2" "${TARGET_2_ID}" "${MG2_URL}" \
            examples/bench/scenario-microgrid/breeders/breeder-2.yml breeder-mg2-config.yaml /tmp/breeder_2_uuid

      - name: Poll Optimization Progress
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          BREEDER_1_UUID=$(cat /tmp/breeder_1_uuid)
          BREEDER_2_UUID=$(cat /tmp/breeder_2_uuid)
          MIN_TRIALS=${{ inputs.min_trials }}
          MAX_WAIT=$((${{ fromJSON(inputs.max_wait_minutes) }} * 60))
          ELAPSED=0

          while [ ${ELAPSED} -lt ${MAX_WAIT} ]; do
            METRICS=$(kubectl exec -n godon deploy/godon-godon-observer -- wget -qO- 'http://localhost:8089/metrics' 2>/dev/null || echo "")
            TRIAL_1=$(echo "${METRICS}" | grep "godon_breeder_total_trials{.*breeder_id=\"${BREEDER_1_UUID}\"" | grep -oP '\} \K[0-9]+' || echo "0")
            TRIAL_2=$(echo "${METRICS}" | grep "godon_breeder_total_trials{.*breeder_id=\"${BREEDER_2_UUID}\"" | grep -oP '\} \K[0-9]+' || echo "0")

            echo "B1: trials=${TRIAL_1}, B2: trials=${TRIAL_2} (${ELAPSED}s)"

            if [ "${TRIAL_1}" -ge "${MIN_TRIALS}" ] 2>/dev/null && \
               [ "${TRIAL_2}" -ge "${MIN_TRIALS}" ] 2>/dev/null; then
              echo "Both breeders reached trial target"
              break
            fi

            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

      - name: Watermark Detection
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          BREEDER_1_UUID=$(cat /tmp/breeder_1_uuid)
          BREEDER_2_UUID=$(cat /tmp/breeder_2_uuid)

          echo "=== Detection: B1(${BREEDER_1_UUID}) -> B2(${BREEDER_2_UUID}) ==="
          RESULT_1=$(kubectl exec -n godon deploy/godon-godon-observer -- wget -qO- "http://localhost:8089/api/watermark-detection/${BREEDER_1_UUID}/${BREEDER_2_UUID}" 2>/dev/null || echo '{"error":"query failed"}')
          echo "${RESULT_1}" | python3 -m json.tool 2>/dev/null || echo "${RESULT_1}"

          echo "=== Detection: B2(${BREEDER_2_UUID}) -> B1(${BREEDER_1_UUID}) ==="
          RESULT_2=$(kubectl exec -n godon deploy/godon-godon-observer -- wget -qO- "http://localhost:8089/api/watermark-detection/${BREEDER_2_UUID}/${BREEDER_1_UUID}" 2>/dev/null || echo '{"error":"query failed"}')
          echo "${RESULT_2}" | python3 -m json.tool 2>/dev/null || echo "${RESULT_2}"

      - name: Cleanup
        if: always()
        run: |
          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          CLI_IMAGE="ghcr.io/godon-dev/godon-cli:latest"

          for UUID_FILE in /tmp/breeder_1_uuid /tmp/breeder_2_uuid; do
            BID=$(cat ${UUID_FILE} 2>/dev/null || echo "")
            if [ -n "${BID}" ]; then
              docker run --rm --network host "${CLI_IMAGE}" \
                --hostname=${{ env.API_HOST }} --port=${{ env.API_PORT }} --insecure \
                breeder purge --force --id="${BID}" 2>/dev/null || true
            fi
          done

          for TID_FILE in /tmp/target_1_id /tmp/target_2_id; do
            TID=$(cat ${TID_FILE} 2>/dev/null || echo "")
            if [ -n "${TID}" ]; then
              docker run --rm --network host "${CLI_IMAGE}" \
                --hostname=${{ env.API_HOST }} --port=${{ env.API_PORT }} --insecure \
                target delete --id="${TID}" 2>/dev/null || true
            fi
          done

          docker compose -f examples/bench/scenario-microgrid/docker-compose.yml -p bench-mg down -v 2>/dev/null || true

          if [ -f /tmp/pf_pid ]; then
            kill $(cat /tmp/pf_pid) 2>/dev/null || true
            rm /tmp/pf_pid
          fi

      - name: Summary
        if: always()
        run: |
          echo "Bench Scenario Microgrid Summary"
          echo "Coupling: ${{ inputs.coupling_factor }}"
          echo "Min trials per breeder: ${{ inputs.min_trials }}"
          echo "Max wait: ${{ fromJSON(inputs.max_wait_minutes) }}m"
          echo "Status: ${{ job.status }}"
