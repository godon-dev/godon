name: "E2E Greenhouse Bench"

on:
  workflow_dispatch:
    inputs:
      min_trials:
        description: "Minimum trials to complete for success"
        required: false
        default: "10"
      max_wait_minutes:
        description: "Max wait time in minutes"
        required: false
        default: "10"
      greenhouse_scenario:
        description: "Greenhouse scenario (simple, medium, complex)"
        required: false
        default: "simple"
      greenhouse_weather:
        description: "Weather mode (smooth, noisy, adversarial)"
        required: false
        default: "smooth"

jobs:
  greenhouse_e2e:
    name: Greenhouse Bench E2E (${{ inputs.min_trials }} trials, ${{ inputs.greenhouse_scenario }}/${{ inputs.greenhouse_weather }})
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout godon repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Verify KIND Cluster
        run: |
          echo "Verifying KIND cluster..."

          if ! kind get clusters | grep -q "godon-1-cluster"; then
            echo "KIND cluster 'godon-1-cluster' not found"
            echo "Please run the 'kind--setup-cluster' and 'charts--reinstall-stack' workflows first"
            exit 1
          fi

          echo "KIND cluster exists"
          kind export kubeconfig --name=godon-1-cluster --kubeconfig=/tmp/kind_kubeconfig.yaml
          kubectl cluster-info --kubeconfig=/tmp/kind_kubeconfig.yaml

      - name: Verify Godon Stack Deployment
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "Verifying godon stack deployment..."

          if ! helm status godon --namespace godon >/dev/null 2>&1; then
            echo "Godon helm release not found"
            echo "Please run the 'charts--reinstall-stack' workflow first"
            exit 1
          fi

          echo "Godon stack is deployed"

          echo "Waiting for godon-api pod to be ready..."
          kubectl wait --for=condition=ready pod -l component=api -n godon --timeout=300s

          API_POD=$(kubectl get pods -n godon -l component=api -o jsonpath='{.items[0].metadata.name}')
          echo "API Pod: ${API_POD}"

      - name: Start Greenhouse Bench Container
        run: |
          echo "Starting godon-bench-greenhouse via docker compose..."

          GREENHOUSE_PORT=18090

          export PORT=${GREENHOUSE_PORT}
          export SCENARIO="${{ inputs.greenhouse_scenario }}"
          export WEATHER="${{ inputs.greenhouse_weather }}"

          docker compose -f examples/docker-compose-greenhouse.yml -p greenhouse-e2e up -d

          echo "Waiting for greenhouse to be healthy..."
          for i in $(seq 1 30); do
            if curl -s -f --connect-timeout 2 http://127.0.0.1:${GREENHOUSE_PORT}/health >/dev/null 2>&1; then
              echo "Greenhouse is healthy"
              break
            fi
            echo "Attempt $i/30 - waiting for greenhouse..."
            sleep 2
          done

          curl -s http://127.0.0.1:${GREENHOUSE_PORT}/health | jq '.' || {
            echo "Greenhouse failed to start"
            docker compose -f /tmp/docker-compose-greenhouse.yml -p greenhouse-e2e logs
            exit 1
          }

          echo "GREENHOUSE_HOST=127.0.0.1" >> $GITHUB_ENV
          echo "GREENHOUSE_PORT=${GREENHOUSE_PORT}" >> $GITHUB_ENV

      - name: Port Forward to Godon API
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "Setting up port forward to godon-api..."

          API_POD=$(kubectl get pods -n godon -l component=api -o jsonpath='{.items[0].metadata.name}')
          echo "API Pod: ${API_POD}"

          LOCALHOST_ADDR="127.0.0.3"
          PORT="9090"

          kubectl port-forward -n godon --address ${LOCALHOST_ADDR} "${API_POD}" ${PORT}:8080 > /tmp/pf.log 2>&1 &
          PF_PID=$!

          sleep 3

          echo ${PF_PID} > /tmp/pf_pid

          READY=false
          for i in $(seq 1 30); do
            if curl -s -f --connect-timeout 2 http://${LOCALHOST_ADDR}:${PORT}/health >/dev/null 2>&1; then
              echo "Port forward is ready!"
              READY=true
              break
            fi
            echo "Attempt $i/30 - waiting for port forward..."
            sleep 2
          done

          if [ "$READY" = false ]; then
            echo "Port forward failed to become ready"
            cat /tmp/pf.log
            kill ${PF_PID} || true
            exit 1
          fi

          echo "API_HOST=${LOCALHOST_ADDR}" >> $GITHUB_ENV
          echo "API_PORT=${PORT}" >> $GITHUB_ENV

      - name: Create Greenhouse Target
        run: |
          echo "Creating HTTP target for greenhouse..."

          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          GREENHOUSE_URL="http://${{ env.GREENHOUSE_HOST }}:${{ env.GREENHOUSE_PORT }}"

          EXISTING_ID=$(curl -s ${API_URL}/targets | jq -r '.[] | select(.name=="greenhouse-e2e") | .id' 2>/dev/null || echo "")
          if [ -n "${EXISTING_ID}" ]; then
            echo "Cleaning up existing target: ${EXISTING_ID}"
            curl -s -X DELETE ${API_URL}/targets/${EXISTING_ID} >/dev/null 2>&1 || true
          fi

          sed "s|GREENHOUSE_URL|${GREENHOUSE_URL}|" examples/greenhouse-target.yaml > greenhouse-target-e2e.yaml

          CLI_IMAGE="ghcr.io/godon-dev/godon-cli:latest"

          CREATE_OUTPUT=$(docker run --rm --network host \
            -v $(pwd):/work:ro \
            -w /work \
            "${CLI_IMAGE}" --hostname=${{ env.API_HOST }} --port=${{ env.API_PORT }} --insecure \
            target create --file=greenhouse-target-e2e.yaml 2>&1 || true)

          echo "${CREATE_OUTPUT}"

          TARGET_ID=$(echo "${CREATE_OUTPUT}" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || echo "")

          if [ -z "${TARGET_ID}" ]; then
            TARGET_ID=$(curl -s ${API_URL}/targets | jq -r '.[] | select(.name=="greenhouse-e2e") | .id' 2>/dev/null || echo "")
          fi

          if [ -z "${TARGET_ID}" ]; then
            echo "Failed to create greenhouse target"
            exit 1
          fi

          echo "Target created: ${TARGET_ID}"
          echo "${TARGET_ID}" > /tmp/target_id

      - name: Run Greenhouse Optimization
        run: |
          echo "Creating greenhouse breeder..."

          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          CLI_IMAGE="ghcr.io/godon-dev/godon-cli:latest"
          TARGET_ID=$(cat /tmp/target_id)

          EXISTING_BREEDER=$(curl -s ${API_URL}/breeders | jq -r '.[] | select(.name=="greenhouse-e2e") | .id' 2>/dev/null || echo "")
          if [ -n "${EXISTING_BREEDER}" ]; then
            echo "Cleaning up existing breeder: ${EXISTING_BREEDER}"
            curl -s -X DELETE "${API_URL}/breeders/${EXISTING_BREEDER}?force=true" >/dev/null 2>&1 || true
            sleep 2
          fi

          sed "s/PLACEHOLDER_TARGET_ID/${TARGET_ID}/" examples/greenhouse.yml > greenhouse-e2e-config.yaml

          CREATE_OUTPUT=$(docker run --rm --network host \
            -v $(pwd):/work \
            -w /work \
            "${CLI_IMAGE}" --hostname=${{ env.API_HOST }} --port=${{ env.API_PORT }} --insecure \
            breeder create --name="greenhouse-e2e" --file=greenhouse-e2e-config.yaml 2>&1 || true)

          echo "${CREATE_OUTPUT}"

          BREEDER_UUID=$(echo "${CREATE_OUTPUT}" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || echo "")

          if [ -z "${BREEDER_UUID}" ]; then
            BREEDER_UUID=$(curl -s ${API_URL}/breeders | jq -r '.[] | select(.name=="greenhouse-e2e") | .id' 2>/dev/null || echo "")
          fi

          if [ -z "${BREEDER_UUID}" ]; then
            echo "Failed to create breeder"
            exit 1
          fi

          echo "Breeder created: ${BREEDER_UUID}"
          echo "${BREEDER_UUID}" > /tmp/breeder_uuid

      - name: Poll Optimization Progress
        run: |
          echo "Polling optimization progress..."

          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          BREEDER_UUID=$(cat /tmp/breeder_uuid)

          MIN_TRIALS=${{ inputs.min_trials }}
          MAX_WAIT=$((${{ inputs.max_wait_minutes }} * 60))
          POLL_INTERVAL=10
          ELAPSED=0

          echo "Waiting for ${MIN_TRIALS} trials (timeout: ${MAX_WAIT}s)"

          while [ ${ELAPSED} -lt ${MAX_WAIT} ]; do
            STATUS=$(curl -s "${API_URL}/breeders/${BREEDER_UUID}" 2>/dev/null || echo "")

            TRIAL_COUNT=$(echo "${STATUS}" | jq -r '.trials_completed // .trialCount // 0' 2>/dev/null || echo "0")
            STATE=$(echo "${STATUS}" | jq -r '.status // .state // "unknown"' 2>/dev/null || echo "unknown")

            echo "State: ${STATE}, Trials: ${TRIAL_COUNT}/${MIN_TRIALS} (${ELAPSED}s elapsed)"

            if [ "${STATE}" = "failed" ] || [ "${STATE}" = "error" ]; then
              echo "Breeder entered error state"
              exit 1
            fi

            if [ "${TRIAL_COUNT}" -ge "${MIN_TRIALS}" ] 2>/dev/null; then
              echo "Trial target reached: ${TRIAL_COUNT}/${MIN_TRIALS}"
              break
            fi

            sleep ${POLL_INTERVAL}
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ ${ELAPSED} -ge ${MAX_WAIT} ]; then
            echo "Timed out waiting for ${MIN_TRIALS} trials (waited ${MAX_WAIT}s)"
            echo "Final breeder status:"
            curl -s "${API_URL}/breeders/${BREEDER_UUID}" | jq . || true
            exit 1
          fi

          echo "Optimization completed successfully"

      - name: Verify Greenhouse Metrics
        run: |
          echo "Verifying optimization results..."

          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          BREEDER_UUID=$(cat /tmp/breeder_uuid)

          echo "=== Breeder Final State ==="
          BREEDER_JSON=$(curl -s "${API_URL}/breeders/${BREEDER_UUID}" 2>/dev/null || echo "{}")
          echo "${BREEDER_JSON}" | jq '.' 2>/dev/null || echo "${BREEDER_JSON}"

          echo ""
          echo "=== Greenhouse Final Metrics ==="
          METRICS=$(curl -s http://${{ env.GREENHOUSE_HOST }}:${{ env.GREENHOUSE_PORT }}/metrics/json 2>/dev/null || echo "{}")
          echo "${METRICS}" | jq '.' 2>/dev/null || echo "${METRICS}"

          echo ""
          echo "=== Greenhouse Final Status ==="
          curl -s http://${{ env.GREENHOUSE_HOST }}:${{ env.GREENHOUSE_PORT }}/status 2>/dev/null | jq '.' 2>/dev/null || true

          echo ""
          echo "E2E greenhouse bench test passed"

      - name: Diagnose Failure
        if: failure()
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "=== Diagnostic Output ==="

          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          BREEDER_UUID=$(cat /tmp/breeder_uuid 2>/dev/null || echo "")

          if [ -n "${BREEDER_UUID}" ]; then
            echo "--- Breeder Final State ---"
            curl -s "${API_URL}/breeders/${BREEDER_UUID}" | jq '.' 2>/dev/null || true
          fi

          echo ""
          echo "--- Loki: Controller Logs (last 5m) ---"
          LOKI_URL="http://godon-observability-loki.godon-observability.svc.cluster.local:3100"
          CONTROLLER_POD=$(kubectl get pods -n godon -l component=controller -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "${CONTROLLER_POD}" ]; then
            kubectl exec -n godon "${CONTROLLER_POD}" -- curl -s "${LOKI_URL}/loki/api/v1/query_range" \
              --data-urlencode 'query={component="controller"}' \
              --data-urlencode "start=$(date -d '5 minutes ago' +%s)000000000" \
              --data-urlencode "end=$(date +%s)000000000" \
              --data-urlencode "limit=80" \
              --data-urlencode "direction=backward" 2>/dev/null | jq -r '.data.result[].values[]?.[1]' 2>/dev/null || \
              kubectl logs -n godon "${CONTROLLER_POD}" --tail=80 2>/dev/null || true
          else
            echo "Controller pod not found"
          fi

          echo ""
          echo "--- Loki: Worker Logs (last 5m) ---"
          WORKER_POD=$(kubectl get pods -n godon -l component=breeder -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -z "${WORKER_POD}" ]; then
            WORKER_POD=$(kubectl get pods -n godon -l app=windmill-worker -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          fi
          if [ -n "${WORKER_POD}" ]; then
            kubectl exec -n godon "${WORKER_POD}" -- curl -s "${LOKI_URL}/loki/api/v1/query_range" \
              --data-urlencode 'query={component=~"breeder|windmill-worker"}' \
              --data-urlencode "start=$(date -d '5 minutes ago' +%s)000000000" \
              --data-urlencode "end=$(date +%s)000000000" \
              --data-urlencode "limit=80" \
              --data-urlencode "direction=backward" 2>/dev/null | jq -r '.data.result[].values[]?.[1]' 2>/dev/null || \
              kubectl logs -n godon "${WORKER_POD}" --tail=80 2>/dev/null || true
          else
            echo "No worker pod found. All pods:"
            kubectl get pods -n godon -o wide 2>/dev/null || true
          fi

          echo ""
          echo "--- Greenhouse Container Logs (last 30 lines) ---"
          docker compose -f examples/docker-compose-greenhouse.yml -p greenhouse-e2e logs --tail=30 2>/dev/null || true

          echo ""
          echo "--- All Pods ---"
          kubectl get pods -n godon -o wide 2>/dev/null || true
          echo ""
          kubectl get pods -n godon-observability -o wide 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up..."

          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          CLI_IMAGE="ghcr.io/godon-dev/godon-cli:latest"

          BREEDER_UUID=$(cat /tmp/breeder_uuid 2>/dev/null || echo "")
          if [ -n "${BREEDER_UUID}" ]; then
            echo "Deleting breeder: ${BREEDER_UUID}"
            docker run --rm --network host "${CLI_IMAGE}" \
              --hostname=${{ env.API_HOST }} --port=${{ env.API_PORT }} --insecure \
              breeder purge --force --id="${BREEDER_UUID}" 2>/dev/null || true
          fi

          TARGET_ID=$(cat /tmp/target_id 2>/dev/null || echo "")
          if [ -n "${TARGET_ID}" ]; then
            echo "Deleting target: ${TARGET_ID}"
            docker run --rm --network host "${CLI_IMAGE}" \
              --hostname=${{ env.API_HOST }} --port=${{ env.API_PORT }} --insecure \
              target delete --id="${TARGET_ID}" 2>/dev/null || true
          fi

          echo "Stopping greenhouse container..."
          docker compose -f examples/docker-compose-greenhouse.yml -p greenhouse-e2e down -v 2>/dev/null || true

          if [ -f /tmp/pf_pid ]; then
            kill $(cat /tmp/pf_pid) 2>/dev/null || true
            rm /tmp/pf_pid
          fi

          echo "Cleanup completed"

      - name: Test Summary
        if: always()
        run: |
          echo "E2E Greenhouse Bench Summary"
          echo "============================="
          echo ""
          echo "Parameters:"
          echo "  Scenario: ${{ inputs.greenhouse_scenario }}"
          echo "  Weather: ${{ inputs.greenhouse_weather }}"
          echo "  Min trials: ${{ inputs.min_trials }}"
          echo "  Max wait: ${{ inputs.max_wait_minutes }}m"
          echo ""
          echo "Stack:"
          echo "  KIND cluster verified"
          echo "  Godon stack verified"
          echo "  Greenhouse via docker compose (host network)"
          echo ""
          echo "Flow:"
          echo "  HTTP target created (spec JSONB)"
          echo "  Breeder created with bench_greenhouse strain"
          echo "  HTTP effectuation -> POST /apply"
          echo "  HTTP reconnaissance -> GET /metrics/json"
          echo "  Polled for trial completion"
          echo ""
          echo "  Status: ${{ job.status }}"
