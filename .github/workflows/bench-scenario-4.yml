name: Bench Scenario 4 — Two Optimizers, Two Coupled Targets (Experiment)

on:
  workflow_dispatch:
    inputs:
      trials:
        description: "Number of optimization trials per breeder"
        required: false
        default: "10"
      coupling_factor:
        description: "Coupling strength (0.0=none, 0.05=weak, 0.1=moderate, 0.2=strong)"
        required: false
        default: "0.1"
      greenhouse_scenario:
        description: "Greenhouse scenario (simple, medium, complex)"
        required: false
        default: "simple"
      greenhouse_weather:
        description: "Weather pattern (smooth, noisy, adversarial)"
        required: false
        default: "smooth"

jobs:
  bench-scenario-4:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start coupled greenhouse targets
        run: |
          cd examples/bench/scenario-4
          COUPLING_FACTOR=${{ inputs.coupling_factor }} \
          docker compose up -d
          sleep 5

      - name: Verify both greenhouses healthy
        run: |
          for port in 8090 8091; do
            curl -sf http://localhost:$port/health | python3 examples/bench/scripts/extract_key.py status
            echo "Port $port: OK"
          done

      - name: Verify coupling is configured
        run: |
          for port in 8090 8091; do
            curl -sf http://localhost:$port/status | python3 examples/bench/scripts/validate_coupling.py $port
          done

      - name: Run independent optimizers on coupled targets
        run: |
          run_optimizer() {
            local PORT=$1
            local LABEL=$2
            for i in $(seq 1 ${{ inputs.trials }}); do
              PARAMS=$(python3 examples/bench/scripts/seeded_params.py $PORT $i)
              RESP=$(curl -sf -X POST http://localhost:$PORT/apply -H 'Content-Type: application/json' -d "$PARAMS")
              GROWTH=$(echo "$RESP" | python3 examples/bench/scripts/extract_key.py growth_rate)
              ENERGY=$(echo "$RESP" | python3 examples/bench/scripts/extract_key.py trial_energy_kwh)
              echo "$LABEL trial $i: growth=$GROWTH energy=$ENERGY"
            done
          }

          run_optimizer 8090 "breeder-1" &
          run_optimizer 8091 "breeder-2" &
          wait

      - name: Verify coupling deltas are non-zero (coupling is active)
        run: |
          for port in 8090 8091; do
            METRICS=$(curl -sf http://localhost:$port/metrics)
            echo "Port $port coupling metrics:"
            echo "$METRICS" | grep "greenhouse_coupling_delta" || true
            echo "$METRICS" | python3 examples/bench/scripts/validate_coupling_active.py $port
          done

      - name: Cleanup
        if: always()
        run: |
          cd examples/bench/scenario-4
          docker compose down -v
