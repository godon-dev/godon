name: Bench Scenario 2 — Single Optimizer, Two Independent Targets

on:
  workflow_dispatch:
    inputs:
      trials:
        description: "Number of optimization trials"
        required: false
        default: "10"
      greenhouse_scenario:
        description: "Greenhouse scenario (simple, medium, complex)"
        required: false
        default: "simple"
      greenhouse_weather:
        description: "Weather pattern (smooth, noisy, adversarial)"
        required: false
        default: "smooth"

jobs:
  bench-scenario-2:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start greenhouse targets
        run: |
          cd examples/bench/scenario-2
          docker compose up -d
          sleep 5

      - name: Verify both greenhouses healthy
        run: |
          for port in 8090 8091; do
            curl -sf http://localhost:$port/health | python3 examples/bench/scripts/extract_key.py status
            echo "Port $port: OK"
          done

      - name: Run optimization — same params to both targets
        run: |
          for i in $(seq 1 ${{ inputs.trials }}); do
            PARAMS=$(python3 examples/bench/scripts/random_params.py)
            G1=$(curl -sf -X POST http://localhost:8090/apply -H 'Content-Type: application/json' -d "$PARAMS")
            G2=$(curl -sf -X POST http://localhost:8091/apply -H 'Content-Type: application/json' -d "$PARAMS")
            GR1=$(echo "$G1" | python3 examples/bench/scripts/extract_key.py growth_rate)
            GR2=$(echo "$G2" | python3 examples/bench/scripts/extract_key.py growth_rate)
            echo "Trial $i: greenhouse-1 growth=$GR1 greenhouse-2 growth=$GR2"
          done

      - name: Validate no coupling on either target
        run: |
          for port in 8090 8091; do
            curl -sf http://localhost:$port/status | python3 examples/bench/scripts/validate_no_coupling.py $port
          done

      - name: Cleanup
        if: always()
        run: |
          cd examples/bench/scenario-2
          docker compose down -v
