name: Bench Scenario 2 — Single Optimizer, Two Independent Targets

on:
  workflow_dispatch:

env:
  GREENHOUSE_IMAGE: ghcr.io/godon-dev/godon-bench-greenhouse:0.1.0

jobs:
  bench-scenario-2:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start greenhouse targets
        run: |
          cd examples/bench/scenario-2
          docker compose up -d
          sleep 5

      - name: Verify both greenhouses healthy
        run: |
          for port in 8090 8091; do
            HEALTH=$(curl -sf http://localhost:$port/health)
            echo "Port $port health: $HEALTH"
            echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'"
          done

      - name: Verify different seeds produce different states
        run: |
          STATUS_1=$(curl -sf http://localhost:8090/status)
          STATUS_2=$(curl -sf http://localhost:8091/status)
          echo "Greenhouse-1 tick: $(echo $STATUS_1 | python3 -c 'import sys,json; print(json.load(sys.stdin)["tick"])')"
          echo "Greenhouse-2 tick: $(echo $STATUS_2 | python3 -c 'import sys,json; print(json.load(sys.stdin)["tick"])')"

      - name: Run optimization — same params to both targets
        run: |
          for i in $(seq 1 10); do
            PARAMS=$(python3 -c "
            import json, random
            print(json.dumps({
              'heating_setpoints': [random.uniform(10,35), random.uniform(10,35)],
              'vent_openings': [random.uniform(0,1), random.uniform(0,1)],
              'shading': random.uniform(0,1),
              'co2_injection': random.uniform(0,15),
              'light_intensity': random.uniform(50,800),
              'irrigation': random.uniform(0.1,2.5),
              'sim_steps': random.randint(20,150)
            }))")

            G1=$(curl -sf -X POST http://localhost:8090/apply -H 'Content-Type: application/json' -d "$PARAMS")
            G2=$(curl -sf -X POST http://localhost:8091/apply -H 'Content-Type: application/json' -d "$PARAMS")

            GR1=$(echo "$G1" | python3 -c "import sys,json; print(json.load(sys.stdin)['growth_rate'])")
            GR2=$(echo "$G2" | python3 -c "import sys,json; print(json.load(sys.stdin)['growth_rate'])")
            echo "Trial $i: gh1 growth=$GR1 gh2 growth=$GR2"
          done

      - name: Validate no coupling on either target
        run: |
          for port in 8090 8091; do
            curl -sf http://localhost:$port/status | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            factor = d.get('coupling_factor', 0)
            neighbors = d.get('coupling_neighbors', [])
            assert factor == 0 or factor is None, f'Port $port: unexpected coupling factor={factor}'
            assert len(neighbors) == 0, f'Port $port: unexpected neighbors {neighbors}'
            print(f'Port $port: no coupling (OK)')
            "
          done

      - name: Cleanup
        if: always()
        run: |
          cd examples/bench/scenario-2
          docker compose down -v
