name: Bench Scenario 1 — Single Optimizer, Single Target

on:
  workflow_dispatch:

env:
  GREENHOUSE_IMAGE: ghcr.io/godon-dev/godon-bench-greenhouse:0.1.0

jobs:
  bench-scenario-1:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start greenhouse target
        run: |
          cd examples/bench/scenario-1
          docker compose up -d
          sleep 5

      - name: Verify greenhouse health
        run: |
          HEALTH=$(curl -sf http://localhost:8090/health)
          echo "Health: $HEALTH"
          echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', f'unexpected: {d}'"

      - name: Run optimization trial (10 iterations)
        run: |
          BEST_GROWTH=0
          for i in $(seq 1 10); do
            PARAMS=$(python3 -c "
            import json, random
            print(json.dumps({
              'heating_setpoints': [random.uniform(10,35), random.uniform(10,35)],
              'vent_openings': [random.uniform(0,1), random.uniform(0,1)],
              'shading': random.uniform(0,1),
              'co2_injection': random.uniform(0,15),
              'light_intensity': random.uniform(50,800),
              'irrigation': random.uniform(0.1,2.5),
              'sim_steps': random.randint(20,150)
            }))")

            RESPONSE=$(curl -sf -X POST http://localhost:8090/apply \
              -H 'Content-Type: application/json' \
              -d "$PARAMS")

            GROWTH=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['growth_rate'])")
            ENERGY=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['trial_energy_kwh'])")

            echo "Trial $i: growth=$GROWTH energy=$ENERGY"

            if [ "$(echo "$GROWTH > $BEST_GROWTH" | bc -l)" -eq 1 ]; then
              BEST_GROWTH=$GROWTH
            fi
          done
          echo "Best growth rate: $BEST_GROWTH"

      - name: Validate coupling is absent
        run: |
          STATUS=$(curl -sf http://localhost:8090/status)
          COUPLING=$(echo "$STATUS" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          factor = d.get('coupling_factor', 0)
          neighbors = d.get('coupling_neighbors', [])
          assert factor == 0 or factor is None, f'Expected no coupling, got factor={factor}'
          assert len(neighbors) == 0, f'Expected no neighbors, got {neighbors}'
          print('OK: no coupling configured')
          ")

      - name: Cleanup
        if: always()
        run: |
          cd examples/bench/scenario-1
          docker compose down -v
