name: "Bench Scenario 1 — Single Optimizer, Single Target"

on:
  workflow_dispatch:
    inputs:
      min_trials:
        description: "Minimum trials for success"
        required: false
        default: "10"
      max_wait_minutes:
        description: "Max wait time in minutes"
        required: false
        default: "15"
      greenhouse_scenario:
        description: "Greenhouse scenario (simple, medium, complex)"
        required: false
        default: "simple"
      greenhouse_weather:
        description: "Weather mode (smooth, noisy, adversarial)"
        required: false
        default: "smooth"

jobs:
  bench-scenario-1:
    name: "S1: 1 breeder → 1 target"
    runs-on: [self-hosted, linux]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Verify KIND Cluster
        run: |
          if ! kind get clusters | grep -q "godon-1-cluster"; then
            echo "KIND cluster not found. Run setup workflows first."
            exit 1
          fi
          kind export kubeconfig --name=godon-1-cluster --kubeconfig=/tmp/kind_kubeconfig.yaml

      - name: Verify Godon Stack
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          if ! helm status godon --namespace godon >/dev/null 2>&1; then
            echo "Godon stack not found."
            exit 1
          fi
          kubectl wait --for=condition=ready pod -l component=api -n godon --timeout=300s

      - name: Start Greenhouse Target
        run: |
          export GREENHOUSE_SCENARIO="${{ inputs.greenhouse_scenario }}"
          export GREENHOUSE_WEATHER="${{ inputs.greenhouse_weather }}"

          docker compose -f examples/bench/scenario-1/docker-compose.yml -p bench-s1 up -d

          echo "Waiting for greenhouse to be healthy..."
          for i in $(seq 1 30); do
            if curl -s -f --connect-timeout 2 http://127.0.0.1:8090/health >/dev/null 2>&1; then
              echo "Healthy"
              break
            fi
            sleep 2
          done

          curl -s http://127.0.0.1:8090/health | jq '.' || {
            echo "Greenhouse failed to start"
            docker compose -f examples/bench/scenario-1/docker-compose.yml -p bench-s1 logs
            exit 1
          }

          GH1_CID=$(docker compose -f examples/bench/scenario-1/docker-compose.yml -p bench-s1 ps -q greenhouse-1)
          docker network connect kind $GH1_CID 2>/dev/null || true
          GH1_IP=$(docker inspect $GH1_CID -f '{{.NetworkSettings.Networks.kind.IPAddress}}')
          echo "Greenhouse KIND IP: ${GH1_IP}"

          echo "GH1_HOST=127.0.0.1" >> $GITHUB_ENV
          echo "GH1_PORT=8090" >> $GITHUB_ENV
          echo "GH1_IP=${GH1_IP}" >> $GITHUB_ENV

      - name: Port Forward to Godon API
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          API_POD=$(kubectl get pods -n godon -l component=api -o jsonpath='{.items[0].metadata.name}')

          kubectl port-forward -n godon --address 127.0.0.3 "${API_POD}" 9090:8080 > /tmp/pf.log 2>&1 &
          echo $! > /tmp/pf_pid
          sleep 3

          for i in $(seq 1 30); do
            if curl -s -f --connect-timeout 2 http://127.0.0.3:9090/health >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          echo "API_HOST=127.0.0.3" >> $GITHUB_ENV
          echo "API_PORT=9090" >> $GITHUB_ENV

      - name: Create Target
        run: |
          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          GH1_URL="http://${{ env.GH1_IP }}:8090"
          CLI_IMAGE="ghcr.io/godon-dev/godon-cli:latest"

          EXISTING=$(curl -s ${API_URL}/targets | jq -r '.[] | select(.name=="bench-s1-gh1") | .id' 2>/dev/null || echo "")
          if [ -n "${EXISTING}" ]; then
            echo "Deleting existing target: ${EXISTING}" >&2
            curl -s -X DELETE ${API_URL}/targets/${EXISTING} >/dev/null 2>&1 || true
          fi

          sed -e "s/TARGET_NAME/bench-s1-gh1/" -e "s|TARGET_URL|${GH1_URL}|" \
            examples/bench/scenario-1/targets/greenhouse-1.yaml > target-gh1.yaml
          chmod 644 target-gh1.yaml

          echo "Creating target bench-s1-gh1..." >&2
          CREATE_OUTPUT=$(docker run --rm --network host \
            -v $(pwd):/work:ro -w /work \
            "${CLI_IMAGE}" --hostname=${{ env.API_HOST }} --port=${{ env.API_PORT }} --insecure \
            target create --file=target-gh1.yaml 2>&1 || true)
          echo "${CREATE_OUTPUT}" >&2

          TARGET_1_ID=$(echo "${CREATE_OUTPUT}" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          if [ -z "${TARGET_1_ID}" ]; then
            TARGET_1_ID=$(curl -s ${API_URL}/targets | jq -r '.[] | select(.name=="bench-s1-gh1") | .id' 2>/dev/null || echo "")
          fi
          if [ -z "${TARGET_1_ID}" ]; then
            echo "Failed to create target" >&2
            exit 1
          fi
          echo "Target: ${TARGET_1_ID}" >&2
          echo "${TARGET_1_ID}" > /tmp/target_1_id

      - name: Create Breeder
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          echo "Verifying API reachability..." >&2
          curl -s -f --connect-timeout 5 http://${{ env.API_HOST }}:${{ env.API_PORT }}/health || {
            echo "API unreachable, restarting port-forward..." >&2
            kill $(cat /tmp/pf_pid) 2>/dev/null || true
            API_POD=$(kubectl get pods -n godon -l component=api -o jsonpath='{.items[0].metadata.name}')
            kubectl port-forward -n godon --address ${{ env.API_HOST }} "${API_POD}" ${{ env.API_PORT }}:8080 > /tmp/pf.log 2>&1 &
            echo $! > /tmp/pf_pid
            sleep 5
            curl -s -f --connect-timeout 5 http://${{ env.API_HOST }}:${{ env.API_PORT }}/health || {
              echo "API still unreachable after port-forward restart" >&2
              exit 1
            }
          }
          echo "API is reachable" >&2

          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          CLI_IMAGE="ghcr.io/godon-dev/godon-cli:latest"
          TARGET_1_ID=$(cat /tmp/target_1_id)
          GH1_URL="http://${{ env.GH1_IP }}:8090"

          EXISTING=$(curl -s ${API_URL}/breeders | jq -r '.[] | select(.name=="bench-s1") | .id' 2>/dev/null || echo "")
          if [ -n "${EXISTING}" ]; then
            echo "Deleting existing breeder: ${EXISTING}" >&2
            curl -s -X DELETE "${API_URL}/breeders/${EXISTING}?force=true" >/dev/null 2>&1 || true
            sleep 5
          fi

          sed -e "s/\"greenhouse-1\"/\"${TARGET_1_ID}\"/" \
              -e "s|http://greenhouse-1:8090|${GH1_URL}|" \
              examples/bench/scenario-1/breeders/breeder.yml > breeder-s1-config.yaml
          chmod 644 breeder-s1-config.yaml

          BREEDER_1_UUID=""
          for ATTEMPT in 1 2 3 4 5; do
            echo "Creating breeder bench-s1 (attempt ${ATTEMPT})..." >&2
            CREATE_OUTPUT=$(docker run --rm --network host \
              -v $(pwd):/work -w /work \
              "${CLI_IMAGE}" --hostname=${{ env.API_HOST }} --port=${{ env.API_PORT }} --insecure \
              breeder create --name="bench-s1" --file=breeder-s1-config.yaml 2>&1 || true)
            echo "${CREATE_OUTPUT}" >&2

            BREEDER_1_UUID=$(echo "${CREATE_OUTPUT}" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
            if [ -z "${BREEDER_1_UUID}" ]; then
              BREEDER_1_UUID=$(curl -s ${API_URL}/breeders | jq -r '.[] | select(.name=="bench-s1") | .id' 2>/dev/null || echo "")
            fi
            if [ -n "${BREEDER_1_UUID}" ]; then
              break
            fi
            echo "Attempt ${ATTEMPT} failed, retrying in 10s..." >&2
            sleep 10
          done

          if [ -z "${BREEDER_1_UUID}" ]; then
            echo "Failed to create breeder bench-s1 after 5 attempts" >&2
            exit 1
          fi
          echo "Breeder: ${BREEDER_1_UUID}" >&2
          echo "${BREEDER_1_UUID}" > /tmp/breeder_1_uuid

      - name: Poll Optimization Progress
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          BREEDER_1_UUID=$(cat /tmp/breeder_1_uuid)
          MIN_TRIALS=${{ inputs.min_trials }}
          MAX_WAIT=$((${{ inputs.max_wait_minutes }} * 60))
          ELAPSED=0

          echo "Waiting for ${MIN_TRIALS} trials (timeout: ${MAX_WAIT}s)"

          while [ ${ELAPSED} -lt ${MAX_WAIT} ]; do
            STATE=$(curl -s "${API_URL}/breeders/${BREEDER_1_UUID}" | jq -r '.status // .state // "unknown"' 2>/dev/null || echo "unknown")

            TRIAL_COUNT=$(kubectl exec -n godon deploy/godon-godon-observer -- wget -qO- 'http://localhost:8089/metrics' 2>/dev/null \
              | grep 'godon_breeder_total_trials{' \
              | grep -oP '\} \K[0-9]+' \
              | sort -rn | head -1 || echo "0")

            echo "State: ${STATE}, Trials: ${TRIAL_COUNT}/${MIN_TRIALS} (${ELAPSED}s)"

            if [ "${STATE}" = "failed" ] || [ "${STATE}" = "error" ]; then
              echo "Breeder entered error state"
              exit 1
            fi

            if [ "${TRIAL_COUNT}" -ge "${MIN_TRIALS}" ] 2>/dev/null; then
              echo "Trial target reached"
              break
            fi

            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          if [ ${ELAPSED} -ge ${MAX_WAIT} ]; then
            echo "Timed out"
            curl -s "${API_URL}/breeders/${BREEDER_1_UUID}" | jq . || true
            exit 1
          fi

      - name: Verify Results
        run: |
          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          BREEDER_1_UUID=$(cat /tmp/breeder_1_uuid)

          echo "=== Breeder Final State ==="
          curl -s "${API_URL}/breeders/${BREEDER_1_UUID}" | jq '.' 2>/dev/null || true

          echo ""
          echo "=== Greenhouse Metrics ==="
          curl -s http://${{ env.GH1_HOST }}:${{ env.GH1_PORT }}/metrics/json | jq '.' 2>/dev/null || true

          echo ""
          echo "=== Greenhouse Status ==="
          curl -s http://${{ env.GH1_HOST }}:${{ env.GH1_PORT }}/status | jq '.' 2>/dev/null || true

          echo ""
          echo "Scenario 1 passed"

      - name: Diagnose Failure
        if: failure()
        env:
          KUBECONFIG: /tmp/kind_kubeconfig.yaml
        run: |
          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          BREEDER_UUID=$(cat /tmp/breeder_1_uuid 2>/dev/null || echo "")

          if [ -n "${BREEDER_UUID}" ]; then
            echo "--- Breeder State ---"
            curl -s "${API_URL}/breeders/${BREEDER_UUID}" | jq '.' 2>/dev/null || true
          fi

          echo ""
          echo "--- Controller Logs ---"
          CONTROLLER_POD=$(kubectl get pods -n godon -l component=controller -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "${CONTROLLER_POD}" ]; then
            kubectl logs -n godon "${CONTROLLER_POD}" --tail=80 2>/dev/null || true
          fi

          echo ""
          echo "--- Worker Logs ---"
          WORKER_POD=$(kubectl get pods -n godon -l component=breeder -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -z "${WORKER_POD}" ]; then
            WORKER_POD=$(kubectl get pods -n godon -l app=windmill-worker -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          fi
          if [ -n "${WORKER_POD}" ]; then
            kubectl logs -n godon "${WORKER_POD}" --tail=80 2>/dev/null || true
          fi

          echo ""
          echo "--- Greenhouse Logs ---"
          docker compose -f examples/bench/scenario-1/docker-compose.yml -p bench-s1 logs --tail=30 2>/dev/null || true

          echo ""
          echo "--- All Pods ---"
          kubectl get pods -n godon -o wide 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          API_URL="http://${{ env.API_HOST }}:${{ env.API_PORT }}"
          CLI_IMAGE="ghcr.io/godon-dev/godon-cli:latest"

          BREEDER_UUID=$(cat /tmp/breeder_1_uuid 2>/dev/null || echo "")
          if [ -n "${BREEDER_UUID}" ]; then
            docker run --rm --network host "${CLI_IMAGE}" \
              --hostname=${{ env.API_HOST }} --port=${{ env.API_PORT }} --insecure \
              breeder purge --force --id="${BREEDER_UUID}" 2>/dev/null || true
          fi

          TARGET_ID=$(cat /tmp/target_1_id 2>/dev/null || echo "")
          if [ -n "${TARGET_ID}" ]; then
            docker run --rm --network host "${CLI_IMAGE}" \
              --hostname=${{ env.API_HOST }} --port=${{ env.API_PORT }} --insecure \
              target delete --id="${TARGET_ID}" 2>/dev/null || true
          fi

          docker compose -f examples/bench/scenario-1/docker-compose.yml -p bench-s1 down -v 2>/dev/null || true

          if [ -f /tmp/pf_pid ]; then
            kill $(cat /tmp/pf_pid) 2>/dev/null || true
            rm /tmp/pf_pid
          fi

      - name: Summary
        if: always()
        run: |
          echo "Bench Scenario 1 Summary"
          echo "========================"
          echo "Scenario: ${{ inputs.greenhouse_scenario }}"
          echo "Weather:  ${{ inputs.greenhouse_weather }}"
          echo "Min trials: ${{ inputs.min_trials }}"
          echo "Max wait: ${{ inputs.max_wait_minutes }}m"
          echo "Layout: 1 breeder → 1 target"
          echo "Status: ${{ job.status }}"
