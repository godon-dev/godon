name: Bench Scenario 1 — Single Optimizer, Single Target

on:
  workflow_dispatch:
    inputs:
      trials:
        description: "Number of optimization trials"
        required: false
        default: "10"
      greenhouse_scenario:
        description: "Greenhouse scenario (simple, medium, complex)"
        required: false
        default: "simple"
      greenhouse_weather:
        description: "Weather pattern (smooth, noisy, adversarial)"
        required: false
        default: "smooth"
      greenhouse_seed:
        description: "RNG seed for reproducibility"
        required: false
        default: "42"

jobs:
  bench-scenario-1:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start greenhouse target
        run: |
          cd examples/bench/scenario-1
          GREENHOUSE_SCENARIO=${{ inputs.greenhouse_scenario }} \
          GREENHOUSE_WEATHER=${{ inputs.greenhouse_weather }} \
          GREENHOUSE_SEED=${{ inputs.greenhouse_seed }} \
          docker compose up -d
          sleep 5

      - name: Verify greenhouse health
        run: |
          curl -sf http://localhost:8090/health | python3 examples/bench/scripts/extract_key.py status

      - name: Run optimization trials
        run: |
          BEST_GROWTH=0
          for i in $(seq 1 ${{ inputs.trials }}); do
            PARAMS=$(python3 examples/bench/scripts/random_params.py)
            RESPONSE=$(curl -sf -X POST http://localhost:8090/apply \
              -H 'Content-Type: application/json' \
              -d "$PARAMS")
            GROWTH=$(echo "$RESPONSE" | python3 examples/bench/scripts/extract_key.py growth_rate)
            ENERGY=$(echo "$RESPONSE" | python3 examples/bench/scripts/extract_key.py trial_energy_kwh)
            echo "Trial $i: growth=$GROWTH energy=$ENERGY"
            if [ "$(echo "$GROWTH > $BEST_GROWTH" | bc -l)" -eq 1 ]; then
              BEST_GROWTH=$GROWTH
            fi
          done
          echo "Best growth rate: $BEST_GROWTH"

      - name: Validate coupling is absent
        run: |
          curl -sf http://localhost:8090/status | python3 examples/bench/scripts/validate_no_coupling.py 8090

      - name: Cleanup
        if: always()
        run: |
          cd examples/bench/scenario-1
          docker compose down -v
